    <rect x="780" y="150" width="12" height="16" rx="1"/>
    <rect x="990" y="180" width="12" height="16" rx="1"/>
  </g>
  <!-- FumÈe -->
  <ellipse cx="550" cy="50" rx="60" ry="30" fill="#333" opacity="0.3"/>
  <ellipse cx="300" cy="70" rx="40" ry="25" fill="#444" opacity="0.25"/>
  <!-- Sol -->
  <rect x="0" y="380" width="1200" height="20" fill="#1a1510"/>
