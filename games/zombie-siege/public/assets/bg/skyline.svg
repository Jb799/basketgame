  </defs>
  <rect width="1200" height="400" fill="url(#skyGrad)"/>
  <!-- Silhouettes immeubles apocalyptiques -->
  <rect x="0" y="180" width="80" height="220" fill="#0d0d0d"/>
  <rect x="90" y="120" width="100" height="280" fill="#111"/>
  <rect x="200" y="200" width="70" height="200" fill="#0a0a0a"/>
  <rect x="280" y="90" width="120" height="310" fill="#151515"/>
  <rect x="410" y="150" width="90" height="250" fill="#0d0d0d"/>
  <rect x="510" y="60" width="140" height="340" fill="#121212"/>
  <rect x="660" y="170" width="85" height="230" fill="#0f0f0f"/>
  <rect x="755" y="100" width="110" height="300" fill="#141414"/>
  <rect x="875" y="190" width="75" height="210" fill="#0c0c0c"/>
  <rect x="960" y="130" width="100" height="270" fill="#111"/>
