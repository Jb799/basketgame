<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Siège Zombie — Défendez l'immeuble contre la horde !" />
  <meta name="theme-color" content="#0a0a0a" />
  <title>Siège Zombie — Live</title>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />

  <link rel="stylesheet" href="shared/column-layout.css" />
  <link rel="stylesheet" href="css/main.css" />
  <link rel="stylesheet" href="css/building.css" />
  <link rel="stylesheet" href="css/zombies.css" />
  <link rel="stylesheet" href="css/hud.css" />
  <link rel="stylesheet" href="css/overlays.css" />
</head>
<body>

  <canvas id="bg-canvas" class="bg-canvas" aria-hidden="true"></canvas>
  <canvas id="confetti-canvas" class="confetti-canvas" aria-hidden="true"></canvas>
  <div id="screen-flash" class="screen-flash" aria-hidden="true" hidden></div>
  <div id="fx-layer" class="fx-layer" aria-hidden="true"></div>

  <div class="siege-screen" id="siege-screen">
    <header class="siege-hud" id="siege-hud" aria-live="polite">
      <div class="siege-hud__block siege-hud__block--score">
        <span class="siege-hud__label">SCORE</span>
        <span class="siege-hud__value" id="hud-score">0</span>
      </div>
      <div class="siege-hud__block siege-hud__block--top">
        <span class="siege-hud__label">TOP</span>
        <span class="siege-hud__value" id="hud-top">0</span>
      </div>
      <div class="siege-hud__block siege-hud__block--wave">
        <span class="siege-hud__label">VAGUE</span>
        <span class="siege-hud__value" id="hud-wave">1</span>
      </div>
      <div class="siege-hud__block siege-hud__block--lives" id="hud-lives" aria-label="Vies restantes"></div>
      <div class="siege-hud__status" id="hud-status">Connexion…</div>
    </header>

    <main class="siege-stage" id="siege-stage">
      <div class="siege-sky" id="siege-sky" aria-hidden="true">
        <div class="siege-sky__smoke siege-sky__smoke--1"></div>
        <div class="siege-sky__smoke siege-sky__smoke--2"></div>
        <div class="siege-sky__smoke siege-sky__smoke--3"></div>
      </div>

      <div class="siege-building-wrap" id="siege-building-wrap">
        <div class="siege-building platform-grid" id="siege-building" aria-label="Immeuble — 7 colonnes">
          <!-- colonnes générées par building.js -->
        </div>
        <div class="siege-ground" aria-hidden="true"></div>
      </div>
    </main>
  </div>

  <div class="wave-overlay" id="wave-overlay" hidden aria-live="assertive">
    <div class="wave-overlay__banner" id="wave-overlay-banner">VAGUE 1</div>
    <p class="wave-overlay__sub" id="wave-overlay-sub"></p>
  </div>

  <div class="gameover-overlay" id="gameover-overlay" hidden aria-live="assertive">
    <div class="gameover-overlay__panel">
      <h2 class="gameover-overlay__title">GAME OVER</h2>
      <p class="gameover-overlay__score">Score : <span id="go-score">0</span></p>
      <p class="gameover-overlay__top">TOP : <span id="go-top">0</span></p>
      <p class="gameover-overlay__wave">Vague atteinte : <span id="go-wave">1</span></p>
      <p class="gameover-overlay__record" id="go-record" hidden>🏆 NOUVEAU RECORD !</p>
    </div>
  </div>

  <script src="shared/effects.js"></script>
  <script src="js/sounds.js"></script>
  <script src="js/effects.js"></script>
  <script src="js/building.js"></script>
  <script src="js/layout.js"></script>
  <script src="js/entities.js"></script>
  <script src="js/shots.js"></script>
  <script src="js/ui.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
